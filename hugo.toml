######################## default configuration ####################
# The base URL of your site (required). This will be prepended to all relative URLs.
baseURL = "/"
# Title of your website (required).
title = "TLBC.pl"
# Your theme name
theme = "hugoplate"
# Default time zone for time stamps; use any valid tz database name: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List
timeZone = "Europe/Warsaw"
# post pagination
paginate = 2 # see https://gohugo.io/extras/pagination/
# post excerpt
summaryLength = 10 # see https://gohugo.io/content-management/excerpts/
hasCJKLanguage = false #  If hasCJKLanguage true, auto-detect Chinese/Japanese/Korean Languages in the content. see: https://gohugo.io/getting-started/configuration/#hascjklanguage

### Language ####
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
[languages]
  [languages.en]
    contentDir = 'content/english'
    disabled = false
    languageCode = 'en-GB'
    languageDirection = 'ltr'
    languageName = 'EN'
    title = 'TLBC.PL EN '
    weight = 1
    [languages.en.params]
      subtitle = 'Reference, Tutorials, and Explanations'
      [languages.en.params.metadata]
        description = "TLBC.pl — red teaming and security research. We help organisations find gaps, validate controls, and improve security posture."
        keywords = ["TLBC", "red teaming", "security research", "cybersecurity", "ethical hacking", "Toruń", "Poland"]
        image = "images/TLBC_X.jpg"
        twitter = "tlbcpl"
      [languages.en.params.privacy_policy]
        link = "/documents/2026-05-27-polityka-prywatnosci-eng.pdf"
  [languages.pl]
    contentDir = 'content/polish'
    disabled = false
    languageCode = 'pl-PL'
    languageDirection = 'ltr'
    languageName = 'Polski'
    title = 'TLBC.pl PL'
    weight = 2
    [languages.pl.params]
      subtitle = 'Red team i badania bezpieczeństwa'
      [languages.pl.params.metadata]
        description = "TLBC.pl — red team i badania bezpieczeństwa. Pomagamy organizacjom wykrywać luki, weryfikować zabezpieczenia i podnosić poziom cyberbezpieczeństwa."
        keywords = ["TLBC", "red team", "badania bezpieczeństwa", "cyberbezpieczeństwo", "ethical hacking", "Toruń", "Polska"]
        image = "images/TLBC_X.jpg"
        twitter = "tlbcpl"
      [languages.pl.params.privacy_policy]
        link = "/documents/polityka-pl.pdf"
      [languages.pl.params.navigation_button]
        enable = true
        label = "Umów konsultację"
        link = "https://outlook.office365.com/book/Letsdosomethinginteresting@tlbc.pl/"
########################### Services #############################
[services]
[services.googleAnalytics]
ID = 'G-MEASUREMENT_ID' # see https://gohugo.io/templates/internal/#configure-google-analytics

[services.disqus]
shortname = 'themefisher-template' # we use disqus to show comments in blog posts . To install disqus please follow this tutorial https://portfolio.peter-baumgartner.net/2017/09/10/how-to-install-disqus-on-hugo/

########################## Permalinks ############################
[permalinks.page]
"pages" = "/:slugorfilename/"


############################# Modules ############################
[module]
[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "hugo_stats.json"
target = "assets/watching/hugo_stats.json"
disableWatch = true

############################# Build ##############################
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/watching/hugo_stats\.json'
target = 'style\.css'
[[build.cachebusters]]
source = '(postcss|tailwind)\.config\.js'
target = 'css'
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = 'js'
[[build.cachebusters]]
source = 'assets/.*\.(css|scss|sass)'
target = 'css'
[[build.cachebusters]]
source = 'data/.*\.(.*)$'
target = 'css'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'


############################# Outputs ############################
[outputs]
home = ["HTML", "RSS", "WebAppManifest", "SearchIndex"]

############################# Imaging ############################
[imaging]
# See https://github.com/disintegration/imaging
# Default JPEG or WebP quality setting. Default is 75.
quality = 80
resampleFilter = "Lanczos"

############################ Caches ##############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"


############################ Markup ##############################
[markup]
[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = 'monokai' # see https://xyproto.github.io/splash/docs/all.html

[markup.tableOfContents]
startLevel = 2
endLevel = 5
ordered = true


########################### Media types ###########################
[mediaTypes]
[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]


########################### Output Format ##########################
[outputFormats]
[outputFormats.WebAppManifest]
mediaType = "application/manifest+json"
rel = "manifest"

[outputFormats.SearchIndex]
mediaType = "application/json"
baseName = "searchindex"
isPlainText = true
notAlternative = true


############################# Plugins ##############################

